<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Résultat</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; }
      img { max-width: 420px; border-radius: 10px; display: block; margin-bottom: 1rem; }
      .pill { padding:.5rem 1rem; margin-right:.5rem; border-radius:999px; border:1px solid #aaa; background:#f5f5f5; cursor:pointer; }
      .pill:hover { background:#e8e8e8; }
      .pill:active { background:#ddd; }
      .btn { padding:.6rem 1rem; border-radius:8px; border:1px solid #222; background:#fff; text-decoration:none; }
    </style>
  </head>
  <body>
    <h1>Résultat</h1>
    <img src="{{ image_data_url }}" alt="submitted image" />
    <h2>Classe prédite : {{ predicted_label }}</h2>
    <p>Confiance : {{ '%.3f'|format(confidence) }}</p>

    <form action="/feedback" method="post" style="margin: 1rem 0;">
      <input type="hidden" name="predicted_label" value="{{ predicted_label }}">
      <input type="hidden" name="confidence" value="{{ confidence }}">
      <input type="hidden" name="image_data" value="{{ image_data_url }}">
      <input type="hidden" name="image_filename" value="{{ image_filename }}">
      {% for c in classes %}
        <button type="submit" name="user_feedback" value="{{ c }}" class="pill">{{ c }}</button>
      {% endfor %}
    </form>

    <p><a href="/">↩︎ Revenir</a></p>
  </body>
</html>
